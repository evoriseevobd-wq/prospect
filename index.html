<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ProspectIQ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: #0c0f14; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #0c0f14; }
  ::-webkit-scrollbar-thumb { background: #2a3142; border-radius: 2px; }
  input::placeholder { color: #3d4559; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shakeX {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
    40%{transform:translateX(8px)} 60%{transform:translateX(-8px)} 80%{transform:translateX(8px)}
  }
  @keyframes scanline { 0%{top:-10%} 100%{top:110%} }
  .card-enter { animation: fadeUp 0.35s ease forwards; }
  .scanning { position: relative; overflow: hidden; }
  .scanning::after {
    content:''; position:absolute; left:0; right:0; height:1px;
    background: linear-gradient(90deg,transparent,rgba(56,189,248,0.6),transparent);
    animation: scanline 1.8s linear infinite;
    top: 0;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const CORRECT_PASSWORD = "1235";
const STATUSES = [
  { id: "none",    label: "Não contatado",   color: "#94a3b8", bg: "rgba(148,163,184,0.12)" },
  { id: "called",  label: "Ligação feita",   color: "#f59e0b", bg: "rgba(245,158,11,0.12)"  },
  { id: "meeting", label: "Reunião marcada", color: "#38bdf8", bg: "rgba(56,189,248,0.12)"  },
  { id: "closed",  label: "Fechado/Cliente", color: "#4ade80", bg: "rgba(74,222,128,0.12)"  },
];
const GRADE_COLORS = { A: "#4ade80", B: "#a3e635", C: "#f59e0b", D: "#f87171" };

const storage = {
  get: (key) => {
    try { const v = localStorage.getItem(key); return v ? { value: v } : null; } catch { return null; }
  },
  set: (key, value) => {
    try { localStorage.setItem(key, value); return true; } catch { return null; }
  }
};

function PasswordScreen({ onUnlock }) {
  const [dots, setDots] = useState([]);
  const [shake, setShake] = useState(false);
  const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];

  function handleKey(k) {
    if (dots.length >= 4) return;
    const next = [...dots, k];
    setDots(next);
    if (next.length === 4) {
      setTimeout(() => {
        if (next.join("") === CORRECT_PASSWORD) { onUnlock(); }
        else { setShake(true); setTimeout(() => { setShake(false); setDots([]); }, 600); }
      }, 200);
    }
  }

  return (
    <div style={{ minHeight:"100vh", background:"#0c0f14", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:32 }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:22, color:"#38bdf8", letterSpacing:3 }}>
          PROSPECT<span style={{ color:"#4ade80" }}>IQ</span>
        </div>
        <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"#3d4559", letterSpacing:3, marginTop:4 }}>ACESSO RESTRITO</div>
      </div>
      <div style={{ display:"flex", gap:16, animation: shake ? "shakeX 0.5s ease" : "none" }}>
        {[0,1,2,3].map(i => (
          <div key={i} style={{
            width:16, height:16, borderRadius:"50%",
            background: i < dots.length ? "#38bdf8" : "transparent",
            border: `2px solid ${i < dots.length ? "#38bdf8" : "#2a3142"}`,
            transition:"all 0.15s ease",
            boxShadow: i < dots.length ? "0 0 8px rgba(56,189,248,0.6)" : "none"
          }} />
        ))}
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(3, 72px)", gap:10 }}>
        {keys.map((k, i) => (
          <button key={i}
            onClick={() => { if (k === "⌫") setDots(d => d.slice(0,-1)); else if (k !== "") handleKey(k); }}
            disabled={k === ""}
            style={{
              width:72, height:72, borderRadius:12,
              background: k === "" ? "transparent" : "#131720",
              border: k === "" ? "none" : "1px solid #1e2535",
              color: k === "⌫" ? "#64748b" : "#e2e8f0",
              fontSize: k === "⌫" ? 18 : 22,
              fontFamily:"'Space Mono',monospace", fontWeight:700,
              cursor: k === "" ? "default" : "pointer"
            }}>{k}</button>
        ))}
      </div>
    </div>
  );
}

function ScoreRing({ score, grade }) {
  const r = 22; const c = 2 * Math.PI * r;
  const color = GRADE_COLORS[grade] || "#94a3b8";
  return (
    <div style={{ position:"relative", width:60, height:60, flexShrink:0 }}>
      <svg width="60" height="60" style={{ transform:"rotate(-90deg)" }}>
        <circle cx="30" cy="30" r={r} fill="none" stroke="#1e2535" strokeWidth="4" />
        <circle cx="30" cy="30" r={r} fill="none" stroke={color} strokeWidth="4"
          strokeDasharray={`${(score/100)*c} ${c}`} strokeLinecap="round"
          style={{ transition:"stroke-dasharray 0.8s ease" }} />
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
        <span style={{ fontFamily:"'Space Mono',monospace", fontSize:13, fontWeight:700, color, lineHeight:1 }}>{score}</span>
        <span style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"#64748b", marginTop:1 }}>{grade}</span>
      </div>
    </div>
  );
}

function Stars({ rating }) {
  const r = Math.round(rating || 0);
  return (
    <span style={{ fontFamily:"'Space Mono',monospace", fontSize:11, color:"#f59e0b", letterSpacing:1 }}>
      {"★".repeat(r)}{"☆".repeat(5-r)}
      <span style={{ color:"#64748b", marginLeft:4 }}>{(rating||0).toFixed(1)}</span>
    </span>
  );
}

function StatusBadge({ status, onChange }) {
  const s = STATUSES.find(x => x.id === status) || STATUSES[0];
  const [open, setOpen] = useState(false);
  return (
    <div style={{ position:"relative" }}>
      <button onClick={() => setOpen(!open)} style={{
        background:s.bg, border:`1px solid ${s.color}40`, color:s.color,
        padding:"4px 10px", borderRadius:4, fontSize:11,
        fontFamily:"'Space Mono',monospace", cursor:"pointer", whiteSpace:"nowrap"
      }}>{s.label} ▾</button>
      {open && (
        <div style={{ position:"absolute", top:"calc(100% + 4px)", left:0, zIndex:100, background:"#131720", border:"1px solid #2a3142", borderRadius:6, overflow:"hidden", minWidth:160 }}>
          {STATUSES.map(st => (
            <button key={st.id} onClick={() => { onChange(st.id); setOpen(false); }} style={{
              display:"block", width:"100%", textAlign:"left", padding:"8px 12px",
              background: st.id === status ? st.bg : "transparent",
              border:"none", color:st.color, fontSize:11,
              fontFamily:"'Space Mono',monospace", cursor:"pointer"
            }}>{st.label}</button>
          ))}
        </div>
      )}
    </div>
  );
}

function PlaceCard({ place, index, onScore, onAdd, scoring, inPipeline }) {
  const [expanded, setExpanded] = useState(false);
  return (
    <div className="card-enter" style={{
      background:"#131720", border:"1px solid #1e2535", borderRadius:8,
      padding:16, display:"flex", flexDirection:"column", gap:10,
      animationDelay:`${index*0.04}s`, opacity:0, position:"relative", overflow:"hidden"
    }}>
      <div style={{ display:"flex", gap:12, alignItems:"flex-start" }}>
        <div style={{ flexShrink:0 }}>
          {place.score !== null ? (
            <ScoreRing score={place.score} grade={place.grade} />
          ) : (
            <div style={{
              width:60, height:60, border:"2px dashed #2a3142", borderRadius:"50%",
              display:"flex", alignItems:"center", justifyContent:"center",
              cursor: scoring ? "default" : "pointer", color:"#3d4559",
              fontSize:10, textAlign:"center", fontFamily:"'Space Mono',monospace",
              flexShrink:0, position:"relative", whiteSpace:"pre-line", lineHeight:1.4
            }} className={scoring ? "scanning" : ""} onClick={() => !scoring && onScore(place, index)}>
              {scoring ? "..." : "IA\nScore"}
            </div>
          )}
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontFamily:"'DM Sans',sans-serif", fontWeight:600, fontSize:14, color:"#e2e8f0", marginBottom:3 }}>{place.name}</div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center", marginBottom:4 }}>
            <Stars rating={place.rating} />
            <span style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:"#64748b" }}>({place.reviewCount} avaliações)</span>
          </div>
          <div style={{ fontSize:12, color:"#64748b", marginBottom:2 }}>📍 {place.address}</div>
          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:12, color:"#38bdf8" }}>📞 {place.phone}</div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:6, flexShrink:0 }}>
          <button onClick={() => onAdd(place)} disabled={inPipeline} style={{
            background: inPipeline ? "#1e2535" : "linear-gradient(135deg,#38bdf8,#0ea5e9)",
            color: inPipeline ? "#3d4559" : "#0c0f14", border:"none",
            padding:"6px 12px", borderRadius:5, fontSize:11, fontWeight:700,
            fontFamily:"'Space Mono',monospace", cursor: inPipeline ? "default" : "pointer", whiteSpace:"nowrap"
          }}>{inPipeline ? "✓ No CRM" : "+ Pipeline"}</button>
          {place.score !== null && (
            <button onClick={() => setExpanded(!expanded)} style={{
              background:"transparent", border:"1px solid #2a3142", color:"#64748b",
              padding:"5px 10px", borderRadius:5, fontSize:10,
              fontFamily:"'Space Mono',monospace", cursor:"pointer"
            }}>{expanded ? "▲ ocultar" : "▼ detalhar"}</button>
          )}
        </div>
      </div>
      {expanded && place.scoreExplanation && (
        <div style={{ borderTop:"1px solid #1e2535", paddingTop:10, display:"flex", flexDirection:"column", gap:8 }}>
          <div style={{ background:"#0c0f14", borderRadius:6, padding:10, border:"1px solid #1e2535" }}>
            <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"#64748b", marginBottom:4, textTransform:"uppercase", letterSpacing:1 }}>Análise do Score</div>
            <div style={{ fontSize:12, color:"#94a3b8", lineHeight:1.5 }}>{place.scoreExplanation}</div>
          </div>
          <div style={{ background:"rgba(56,189,248,0.05)", borderRadius:6, padding:10, border:"1px solid rgba(56,189,248,0.15)" }}>
            <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"#38bdf8", marginBottom:4, textTransform:"uppercase", letterSpacing:1 }}>🎯 Pitch Sugerido</div>
            <div style={{ fontSize:12, color:"#e2e8f0", lineHeight:1.6, fontStyle:"italic" }}>"{place.pitch}"</div>
          </div>
        </div>
      )}
    </div>
  );
}

function PipelineRow({ prospect, onStatusChange, onRemove }) {
  return (
    <div style={{ background:"#131720", border:"1px solid #1e2535", borderRadius:8, padding:"12px 16px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
      {prospect.score !== null && <ScoreRing score={prospect.score} grade={prospect.grade} />}
      <div style={{ flex:1, minWidth:160 }}>
        <div style={{ fontFamily:"'DM Sans',sans-serif", fontWeight:600, fontSize:13, color:"#e2e8f0" }}>{prospect.name}</div>
        <div style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:"#64748b" }}>{prospect.city} · {prospect.category}</div>
        <div style={{ fontFamily:"'Space Mono',monospace", fontSize:11, color:"#38bdf8", marginTop:2 }}>{prospect.phone}</div>
      </div>
      <Stars rating={prospect.rating} />
      <StatusBadge status={prospect.status} onChange={(s) => onStatusChange(prospect.id, s)} />
      <button onClick={() => onRemove(prospect.id)} style={{
        background:"transparent", border:"1px solid #2a3142", color:"#64748b",
        width:28, height:28, borderRadius:4, cursor:"pointer", fontSize:14, flexShrink:0
      }}>×</button>
    </div>
  );
}

function App() {
  const [unlocked, setUnlocked] = useState(false);
  const [tab, setTab] = useState("config");
  const [geminiKey, setGeminiKey] = useState("");
  const [googleKey, setGoogleKey] = useState("");
  const [city, setCity] = useState("Botucatu");
  const [category, setCategory] = useState("");
  const [minReviews, setMinReviews] = useState(30);
  const [results, setResults] = useState([]);
  const [pipeline, setPipeline] = useState([]);
  const [loading, setLoading] = useState(false);
  const [loadingPage, setLoadingPage] = useState(0);
  const [scoringId, setScoringId] = useState(null);
  const [keySaved, setKeySaved] = useState(false);
  const [error, setError] = useState("");

  useEffect(() => {
    try { const p = storage.get("pipeline_v1"); if (p) setPipeline(JSON.parse(p.value)); } catch {}
    try {
      const k = storage.get("api_keys_v2");
      if (k) {
        const keys = JSON.parse(k.value);
        setGeminiKey(keys.gemini || "");
        setGoogleKey(keys.google || "");
        if (keys.google) setTab("search");
      }
    } catch {}
  }, []);

  if (!unlocked) return <PasswordScreen onUnlock={() => setUnlocked(true)} />;

  function saveKeys() {
    storage.set("api_keys_v2", JSON.stringify({ gemini: geminiKey, google: googleKey }));
    setKeySaved(true);
    setTimeout(() => { setKeySaved(false); setTab("search"); }, 900);
  }

  function savePipeline(data) {
    try { storage.set("pipeline_v1", JSON.stringify(data)); } catch {}
  }

  async function doSearch() {
    if (!googleKey || !category.trim() || !city.trim()) {
      setError("Preencha cidade, categoria e configure as chaves na aba Config.");
      return;
    }
    setError(""); setLoading(true); setLoadingPage(0); setResults([]);

    const HEADERS = {
      "Content-Type": "application/json",
      "X-Goog-Api-Key": googleKey,
      "X-Goog-FieldMask": "places.id,places.displayName,places.formattedAddress,places.nationalPhoneNumber,places.rating,places.userRatingCount,places.regularOpeningHours,nextPageToken"
    };

    function mapPlace(p) {
      return {
        id: p.id,
        name: p.displayName?.text || "Sem nome",
        address: p.formattedAddress || "",
        phone: p.nationalPhoneNumber || "N/D",
        rating: p.rating || 0,
        reviewCount: p.userRatingCount || 0,
        weekdayText: p.regularOpeningHours?.weekdayDescriptions || [],
        category, city,
        score: null, grade: null, scoreExplanation: null, pitch: null
      };
    }

    try {
      let allPlaces = [];
      let pageToken = null;
      let page = 0;

      do {
        const body = { textQuery: `${category} em ${city}`, languageCode: "pt-BR", maxResultCount: 20 };
        if (pageToken) body.pageToken = pageToken;

        const res = await fetch("https://places.googleapis.com/v1/places:searchText", {
          method: "POST", headers: HEADERS, body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error?.message || `HTTP ${res.status}`);
        }
        const data = await res.json();
        const batch = (data.places || []).map(mapPlace);
        allPlaces = [...allPlaces, ...batch];
        pageToken = data.nextPageToken || null;
        page++;
        setLoadingPage(page);

        // Mostra resultados parciais já na tela enquanto carrega
        const filtered = allPlaces.filter(p => p.reviewCount >= minReviews);
        setResults([...filtered]);

        // Pequena pausa entre páginas (API recomenda)
        if (pageToken && page < 5) await new Promise(r => setTimeout(r, 800));

      } while (pageToken && page < 5);

      const filtered = allPlaces.filter(p => p.reviewCount >= minReviews);
      setResults(filtered);
      if (filtered.length === 0) setError(`Nenhum resultado com ${minReviews}+ avaliações. Tente diminuir o filtro.`);
    } catch (e) { setError("Erro: " + e.message); }
    setLoading(false);
    setLoadingPage(0);
  }

  async function scorePlace(place, index) {
    if (!geminiKey) { setError("Configure a chave Gemini na aba Config!"); return; }
    setScoringId(place.id);
    setError("");

const prompt = `Você é um consultor de prospecção B2B altamente criterioso. Avalie com RIGOR este prospect para serviços de marketing digital.

DADOS DO PROSPECT:
- Nome: ${place.name}
- Categoria: ${place.category}
- Cidade: ${place.city}
- Avaliação Google: ${place.rating}/5
- Número de avaliações: ${place.reviewCount}
- Telefone disponível: ${place.phone !== "N/D" ? "Sim" : "Não"}

CRITÉRIOS DE PONTUAÇÃO (seja rigoroso e varie o score):
- Avaliação < 3.5 → penalize fortemente (-15 a -25 pts)
- Avaliação 3.5-4.0 → neutro
- Avaliação > 4.5 → bônus (+10 pts)
- Menos de 30 avaliações → sinal de negócio pequeno (-15 pts)
- 50-200 avaliações → médio porte (neutro)
- 200+ avaliações → negócio estabelecido (+15 pts)
- Sem telefone → penalize (-10 pts)
- Categorias como clínica, academia, restaurante premium → maior potencial (+10 pts)

Use toda a escala de 0 a 100. NÃO retorne sempre 85. Varie conforme os dados reais.

Responda SOMENTE com JSON puro, sem markdown:
{"score":XX,"grade":"X","explanation":"2 frases sobre pontos fortes e fracos reais.","pitch":"2 frases de pitch personalizado."}

Grades: A=80-100, B=60-79, C=40-59, D=0-39`;
    try {
      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${geminiKey}`,
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: prompt }] }],
            generationConfig: { temperature: 0.4, maxOutputTokens: 500 }
          })
        }
      );
      if (!res.ok) {
        const errData = await res.json();
        throw new Error(errData.error?.message || `HTTP ${res.status}`);
      }
      const data = await res.json();
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
      const clean = raw.replace(/```json|```/g, "").trim();
      const parsed = JSON.parse(clean);
      setResults(prev => prev.map((p, i) => i === index
        ? { ...p, score: parsed.score, grade: parsed.grade, scoreExplanation: parsed.explanation, pitch: parsed.pitch }
        : p
      ));
    } catch (e) { setError("Erro no scoring: " + e.message); }
    setScoringId(null);
  }

  async function scoreAll() {
    for (let i = 0; i < results.length; i++) {
      if (results[i].score === null) await scorePlace(results[i], i);
    }
  }

  function addToPipeline(place) {
    if (pipeline.find(p => p.id === place.id)) return;
    const updated = [...pipeline, { ...place, status: "none", addedAt: new Date().toISOString() }];
    setPipeline(updated); savePipeline(updated);
  }

  function updateStatus(id, status) {
    const updated = pipeline.map(p => p.id === id ? { ...p, status } : p);
    setPipeline(updated); savePipeline(updated);
  }

  function removeFromPipeline(id) {
    const updated = pipeline.filter(p => p.id !== id);
    setPipeline(updated); savePipeline(updated);
  }

  function exportExcel() {
    const XLSX = window.XLSX;
    const rows = pipeline.map(p => ({
      Nome: p.name, Categoria: p.category, Cidade: p.city,
      Telefone: p.phone, "Endereço": p.address,
      "Avaliação": p.rating, "Nº Avaliações": p.reviewCount,
      Score: p.score || "", Grade: p.grade || "",
      "Análise IA": p.scoreExplanation || "",
      "Pitch Sugerido": p.pitch || "",
      Status: STATUSES.find(s => s.id === p.status)?.label || "",
      "Adicionado em": new Date(p.addedAt).toLocaleDateString("pt-BR"),
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = [20,15,12,14,30,8,12,6,6,40,50,18,12].map(w => ({ wch: w }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Prospects");
    XLSX.writeFile(wb, `prospects_${new Date().toLocaleDateString("pt-BR").replace(/\//g,"_")}.xlsx`);
  }

  const pipelineByStatus = STATUSES.reduce((acc, s) => { acc[s.id] = pipeline.filter(p => p.status === s.id).length; return acc; }, {});

  return (
    <div style={{ minHeight:"100vh", background:"#0c0f14", fontFamily:"'DM Sans',sans-serif", color:"#e2e8f0", paddingBottom:60 }}>
      <div style={{ background:"linear-gradient(180deg,#0f131a,#0c0f14)", borderBottom:"1px solid #1e2535", padding:"16px 24px", display:"flex", alignItems:"center", gap:16 }}>
        <div>
          <div style={{ fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:15, color:"#38bdf8", letterSpacing:2 }}>
            PROSPECT<span style={{ color:"#4ade80" }}>IQ</span>
          </div>
          <div style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"#3d4559", letterSpacing:3, textTransform:"uppercase" }}>sistema de prospecção b2b</div>
        </div>
        <div style={{ flex:1 }} />
        {["config","search","pipeline"].map(t => (
          <button key={t} onClick={() => setTab(t)} style={{
            background: tab===t ? "rgba(56,189,248,0.1)" : "transparent",
            border: tab===t ? "1px solid rgba(56,189,248,0.3)" : "1px solid transparent",
            color: tab===t ? "#38bdf8" : "#64748b",
            padding:"6px 14px", borderRadius:6, cursor:"pointer",
            fontFamily:"'Space Mono',monospace", fontSize:10, letterSpacing:1, textTransform:"uppercase"
          }}>
            {t==="config" ? "⚙ Config" : t==="search" ? "🔍 Busca" : `📋 Pipeline${pipeline.length>0?` (${pipeline.length})`:""}`}
          </button>
        ))}
      </div>

      <div style={{ maxWidth:900, margin:"0 auto", padding:"24px 16px" }}>

        {tab === "config" && (
          <div style={{ display:"flex", flexDirection:"column", gap:16, maxWidth:520, margin:"0 auto" }}>
            <div style={{ fontFamily:"'Space Mono',monospace", fontSize:11, color:"#64748b", letterSpacing:2, textTransform:"uppercase" }}>Configuração de chaves de API</div>
            <div style={{ background:"#131720", border:"1px solid #1e2535", borderRadius:10, padding:20, display:"flex", flexDirection:"column", gap:14 }}>
              {[
                { label:"Chave Google (Places API New)", hint:"AIza...", val:googleKey, set:setGoogleKey, note:'Ative "Places API (New)" no Google Cloud Console' },
                { label:"Chave Gemini API (Score IA — Grátis)", hint:"AIza...", val:geminiKey, set:setGeminiKey, note:"Grátis em aistudio.google.com/apikey" },
              ].map(f => (
                <div key={f.label}>
                  <label style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:"#64748b", display:"block", marginBottom:6, textTransform:"uppercase", letterSpacing:1 }}>{f.label}</label>
                  <input type="password" value={f.val} onChange={e => f.set(e.target.value)} placeholder={f.hint} style={{
                    width:"100%", background:"#0c0f14", border:"1px solid #2a3142", borderRadius:6,
                    padding:"9px 12px", color:"#e2e8f0", fontFamily:"'Space Mono',monospace", fontSize:12
                  }} />
                  <div style={{ fontSize:11, color:"#3d4559", marginTop:4 }}>{f.note}</div>
                </div>
              ))}
              <button onClick={saveKeys} style={{
                background: keySaved ? "linear-gradient(135deg,#4ade80,#22c55e)" : "linear-gradient(135deg,#38bdf8,#0ea5e9)",
                color:"#0c0f14", border:"none", borderRadius:7, padding:"10px 20px",
                fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:12, cursor:"pointer", letterSpacing:1
              }}>{keySaved ? "✓ SALVO!" : "SALVAR E CONTINUAR →"}</button>
            </div>
            <div style={{ background:"rgba(74,222,128,0.05)", border:"1px solid rgba(74,222,128,0.2)", borderRadius:8, padding:14 }}>
              <div style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:"#4ade80", marginBottom:8 }}>✦ COMO OBTER AS CHAVES</div>
              <div style={{ fontSize:12, color:"#94a3b8", lineHeight:2 }}>
                <strong style={{color:"#e2e8f0"}}>1. Google Places</strong> → console.cloud.google.com → APIs → Places API (New)<br/>
                <strong style={{color:"#e2e8f0"}}>2. Gemini (grátis)</strong> → aistudio.google.com/apikey → Create API Key
              </div>
            </div>
          </div>
        )}

        {tab === "search" && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div style={{ background:"#131720", border:"1px solid #1e2535", borderRadius:10, padding:16 }}>
              <div style={{ display:"flex", gap:10, flexWrap:"wrap", alignItems:"flex-end" }}>
                <div style={{ flex:"1 1 130px" }}>
                  <label style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"#64748b", display:"block", marginBottom:5, textTransform:"uppercase", letterSpacing:1 }}>Cidade</label>
                  <input value={city} onChange={e => setCity(e.target.value)} onKeyDown={e => e.key==="Enter" && doSearch()} style={{ width:"100%", background:"#0c0f14", border:"1px solid #2a3142", borderRadius:6, padding:"8px 10px", color:"#e2e8f0", fontSize:13 }} />
                </div>
                <div style={{ flex:"2 1 180px" }}>
                  <label style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"#64748b", display:"block", marginBottom:5, textTransform:"uppercase", letterSpacing:1 }}>Categoria / Segmento</label>
                  <input value={category} onChange={e => setCategory(e.target.value)} onKeyDown={e => e.key==="Enter" && doSearch()} placeholder="ex: pizzaria, clínica, academia..." style={{ width:"100%", background:"#0c0f14", border:"1px solid #2a3142", borderRadius:6, padding:"8px 10px", color:"#e2e8f0", fontSize:13 }} />
                </div>
                <div style={{ flex:"0 1 120px" }}>
                  <label style={{ fontFamily:"'Space Mono',monospace", fontSize:9, color:"#64748b", display:"block", marginBottom:5, textTransform:"uppercase", letterSpacing:1 }}>Mín. avaliações</label>
                  <input type="number" value={minReviews} onChange={e => setMinReviews(+e.target.value)} style={{ width:"100%", background:"#0c0f14", border:"1px solid #2a3142", borderRadius:6, padding:"8px 10px", color:"#e2e8f0", fontFamily:"'Space Mono',monospace", fontSize:13 }} />
                </div>
                <button onClick={doSearch} disabled={loading} style={{
                  background: loading ? "#1e2535" : "linear-gradient(135deg,#38bdf8,#0ea5e9)",
                  color: loading ? "#3d4559" : "#0c0f14", border:"none", borderRadius:7,
                  padding:"9px 20px", fontFamily:"'Space Mono',monospace", fontWeight:700,
                  fontSize:12, cursor: loading ? "default" : "pointer", letterSpacing:1, whiteSpace:"nowrap"
                }}>{loading ? `BUSCANDO... ${loadingPage > 0 ? `(pág ${loadingPage}/5)` : ""}` : "BUSCAR →"}</button>
              </div>
            </div>

            {error && <div style={{ background:"rgba(248,113,113,0.08)", border:"1px solid rgba(248,113,113,0.25)", borderRadius:7, padding:"10px 14px", color:"#f87171", fontSize:12 }}>{error}</div>}

            {results.length > 0 && (
              <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                <span style={{ fontFamily:"'Space Mono',monospace", fontSize:10, color:"#64748b" }}>{results.length} resultados</span>
                <div style={{ flex:1 }} />
                <button onClick={scoreAll} disabled={!!scoringId} style={{ background:"rgba(74,222,128,0.1)", border:"1px solid rgba(74,222,128,0.25)", color:"#4ade80", padding:"5px 14px", borderRadius:5, fontSize:10, fontFamily:"'Space Mono',monospace", cursor:"pointer" }}>⚡ Score IA em todos</button>
                <button onClick={() => results.forEach(p => addToPipeline(p))} style={{ background:"rgba(56,189,248,0.1)", border:"1px solid rgba(56,189,248,0.25)", color:"#38bdf8", padding:"5px 14px", borderRadius:5, fontSize:10, fontFamily:"'Space Mono',monospace", cursor:"pointer" }}>+ Todos no pipeline</button>
              </div>
            )}

            <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
              {results.map((place, i) => (
                <PlaceCard key={place.id} place={place} index={i}
                  onScore={scorePlace} onAdd={addToPipeline}
                  scoring={scoringId === place.id}
                  inPipeline={!!pipeline.find(p => p.id === place.id)} />
              ))}
            </div>
          </div>
        )}

        {tab === "pipeline" && (
          <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
            <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
              {STATUSES.map(s => (
                <div key={s.id} style={{ background:s.bg, border:`1px solid ${s.color}30`, borderRadius:8, padding:"10px 16px", flex:"1 1 120px" }}>
                  <div style={{ fontFamily:"'Space Mono',monospace", fontSize:20, fontWeight:700, color:s.color }}>{pipelineByStatus[s.id]}</div>
                  <div style={{ fontSize:11, color:"#94a3b8", marginTop:2 }}>{s.label}</div>
                </div>
              ))}
            </div>

            {pipeline.length > 0 ? (
              <>
                <div style={{ display:"flex", justifyContent:"flex-end" }}>
                  <button onClick={exportExcel} style={{ background:"linear-gradient(135deg,#4ade80,#22c55e)", color:"#0c0f14", border:"none", borderRadius:7, padding:"8px 18px", fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:11, cursor:"pointer", letterSpacing:1 }}>↓ EXPORTAR EXCEL</button>
                </div>
                <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                  {STATUSES.flatMap(s => pipeline.filter(p => p.status === s.id)).map(p => (
                    <PipelineRow key={p.id} prospect={p} onStatusChange={updateStatus} onRemove={removeFromPipeline} />
                  ))}
                </div>
              </>
            ) : (
              <div style={{ textAlign:"center", padding:"60px 20px", color:"#3d4559", fontFamily:"'Space Mono',monospace", fontSize:12 }}>
                Pipeline vazio.<br/><span style={{ color:"#64748b" }}>Adicione prospects na aba Busca.</span>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
