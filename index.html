        h("div", { style: { display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" } },

  function doSearch() {
    if (!category.trim() || !city.trim()) { setError("Preencha cidade e categoria."); return; }
    setError(""); setLoading(true); setLoadingPage(0); setResults([]);

    var HEADERS = { "Content-Type": "application/json", "X-Goog-Api-Key": GOOGLE_KEY, "X-Goog-FieldMask": "places.id,places.displayName,places.formattedAddress,places.nationalPhoneNumber,places.rating,places.userRatingCount,nextPageToken" };
    var allPlaces = [];
    var pageToken = null;
    var page = 0;
    var catSnap = category; var citySnap = city; var minSnap = minReviews;

    function mapPlace(p) {
      return { id:p.id, name:(p.displayName&&p.displayName.text)||"Sem nome", address:p.formattedAddress||"", phone:p.nationalPhoneNumber||"N/D", rating:p.rating||0, reviewCount:p.userRatingCount||0, category:catSnap, city:citySnap, score:null, grade:null, scoreExplanation:null, pitch:null };
    }

    function fetchPage() {
      var body = { textQuery: catSnap+" em "+citySnap, languageCode:"pt-BR", maxResultCount:20 };
      if (pageToken) body.pageToken = pageToken;
      fetch("https://places.googleapis.com/v1/places:searchText", { method:"POST", headers:HEADERS, body:JSON.stringify(body) })
        .then(function(res) { return res.json().then(function(d) { return { ok:res.ok, d:d }; }); })
        .then(function(rd) {
          if (!rd.ok) throw new Error((rd.d.error&&rd.d.error.message)||"Erro API");
          allPlaces = allPlaces.concat((rd.d.places||[]).map(mapPlace));
          pageToken = rd.d.nextPageToken || null;
          page++;
          setLoadingPage(page);
          setResults(allPlaces.filter(function(p) { return p.reviewCount >= minSnap; }));
          if (pageToken && page < 5) {
            setTimeout(fetchPage, 800);
          } else {
            var filtered = allPlaces.filter(function(p) { return p.reviewCount >= minSnap; });
            setResults(filtered);
            if (filtered.length === 0) setError("Nenhum resultado com "+minSnap+"+ avaliacoes.");
            setLoading(false); setLoadingPage(0);
          }
        })
        .catch(function(e) { setError("Erro: "+e.message); setLoading(false); setLoadingPage(0); });
    }
    fetchPage();
  }

  function scorePlace(place, index) {
    setScoringId(place.id); setError("");
    var prompt = "Avalie este prospect para servicos de marketing digital.\n\nNome: "+place.name+"\nCategoria: "+place.category+"\nCidade: "+place.city+"\nAvaliacao Google: "+place.rating+"/5\nNumero de avaliacoes: "+place.reviewCount+"\nTelefone: "+(place.phone!=="N/D"?"Sim":"Nao")+"\n\nCriterios: avaliacao < 3.5 penalize, > 4.5 bonus, 200+ avaliacoes bonus, sem telefone penalize. Use escala 0-100. Responda SOMENTE JSON puro sem markdown: {\"score\":XX,\"grade\":\"X\",\"explanation\":\"2 frases.\",\"pitch\":\"2 frases de pitch.\"}\nGrades: A=80-100, B=60-79, C=40-59, D=0-39";
    fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key="+GEMINI_KEY, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.4, maxOutputTokens:500} })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      var raw = (data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text)||"{}";
      var clean = raw.replace(/```json|```/g, "").trim();
      var parsed = JSON.parse(clean);
      setResults(function(prev) { return prev.map(function(p, i) { return i===index ? Object.assign({}, p, {score:parsed.score, grade:parsed.grade, scoreExplanation:parsed.explanation, pitch:parsed.pitch}) : p; }); });
      setScoringId(null);
    })
    .catch(function(e) { setError("Erro no scoring: "+e.message); setScoringId(null); });
  }

  function scoreAll() {
    var i = 0;
    function next() {
      while (i < results.length && results[i].score !== null) i++;
      if (i < results.length) { scorePlace(results[i], i); i++; setTimeout(next, 1500); }
    }
    next();
  }

  function addToPipeline(place) {
    if (pipeline.find(function(p) { return p.id===place.id; })) return;
    var updated = pipeline.concat(Object.assign({}, place, {status:"none", obs:"", addedAt:new Date().toISOString()}));
    setPipeline(updated); savePipeline(updated);
  }

  function updateStatus(id, status) {
    var updated = pipeline.map(function(p) { return p.id===id ? Object.assign({}, p, {status:status}) : p; });
    setPipeline(updated); savePipeline(updated);
  }

  function updateObs(id, obs) {
    var updated = pipeline.map(function(p) { return p.id===id ? Object.assign({}, p, {obs:obs}) : p; });
    setPipeline(updated); savePipeline(updated);
  }

  function removeFromPipeline(id) {
    var updated = pipeline.filter(function(p) { return p.id!==id; });
    setPipeline(updated); savePipeline(updated);
  }

  function exportExcel() {
    var XLSX = window.XLSX;
    var rows = pipeline.map(function(p) {
      var found = statuses.find(function(s) { return s.id===p.status; });
      return { Nome:p.name, Categoria:p.category, Cidade:p.city, Telefone:p.phone, Endereco:p.address, Avaliacao:p.rating, Avaliacoes:p.reviewCount, Score:p.score||"", Grade:p.grade||"", Analise:p.scoreExplanation||"", Pitch:p.pitch||"", Status:(found&&found.label)||"", Observacoes:p.obs||"", Adicionado:new Date(p.addedAt).toLocaleDateString("pt-BR") };
    });
    var ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = [20,15,12,14,30,8,12,6,6,40,50,18,40,12].map(function(w) { return {wch:w}; });
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Prospects");
    XLSX.writeFile(wb, "prospects_"+new Date().toLocaleDateString("pt-BR").replace(/\//g,"_")+".xlsx");
  }

  var pipelineByStatus = {};
  statuses.forEach(function(s) { pipelineByStatus[s.id] = pipeline.filter(function(p) { return p.status===s.id; }).length; });

  var orderedPipeline = statuses.reduce(function(arr, s) {
    return arr.concat(pipeline.filter(function(p) { return p.status===s.id; }));
  }, []);

  return h("div", { style: { minHeight:"100vh", background:"#0c0f14", fontFamily:"'DM Sans',sans-serif", color:"#e2e8f0", paddingBottom:60 } },

    // HEADER
    h("div", { style: { background:"linear-gradient(180deg,#0f131a,#0c0f14)", borderBottom:"1px solid #1e2535", padding:"16px 24px", display:"flex", alignItems:"center", gap:16 } },
      h("div", null,
        h("div", { style: { fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:15, color:"#38bdf8", letterSpacing:2 } },
          "PROSPECT", h("span", { style: {color:"#4ade80"} }, "IQ")
        ),
        h("div", { style: { fontFamily:"'Space Mono',monospace", fontSize:9, color:"#3d4559", letterSpacing:3, textTransform:"uppercase" } }, "sistema de prospeccao b2b")
      ),
      h("div", { style: {flex:1} }),
      h("button", { onClick: function() { setTab("search"); }, style: { background: tab==="search" ? "rgba(56,189,248,0.1)" : "transparent", border: tab==="search" ? "1px solid rgba(56,189,248,0.3)" : "1px solid transparent", color: tab==="search" ? "#38bdf8" : "#64748b", padding:"6px 14px", borderRadius:6, cursor:"pointer", fontFamily:"'Space Mono',monospace", fontSize:10, letterSpacing:1, textTransform:"uppercase" } }, "\uD83D\uDD0D Busca"),
      h("button", { onClick: function() { setTab("pipeline"); }, style: { background: tab==="pipeline" ? "rgba(56,189,248,0.1)" : "transparent", border: tab==="pipeline" ? "1px solid rgba(56,189,248,0.3)" : "1px solid transparent", color: tab==="pipeline" ? "#38bdf8" : "#64748b", padding:"6px 14px", borderRadius:6, cursor:"pointer", fontFamily:"'Space Mono',monospace", fontSize:10, letterSpacing:1, textTransform:"uppercase" } }, "\uD83D\uDCCB Pipeline"+(pipeline.length>0 ? " ("+pipeline.length+")" : ""))
    ),

    // CONTENT
    h("div", { style: { maxWidth:900, margin:"0 auto", padding:"24px 16px" } },

      // SEARCH TAB
      tab === "search" && h("div", { style: { display:"flex", flexDirection:"column", gap:16 } },
        h("div", { style: { background:"#131720", border:"1px solid #1e2535", borderRadius:10, padding:16 } },
          h("div", { style: { display:"flex", gap:10, flexWrap:"wrap", alignItems:"flex-end" } },
            h("div", { style: { flex:"1 1 130px" } },
              h("label", { style: { fontFamily:"'Space Mono',monospace", fontSize:9, color:"#64748b", display:"block", marginBottom:5, textTransform:"uppercase", letterSpacing:1 } }, "Cidade"),
              h("input", { value:city, onChange: function(e) { setCity(e.target.value); }, onKeyDown: function(e) { if (e.key==="Enter") doSearch(); }, style: { width:"100%", background:"#0c0f14", border:"1px solid #2a3142", borderRadius:6, padding:"8px 10px", color:"#e2e8f0", fontSize:13 } })
            ),
            h("div", { style: { flex:"2 1 180px" } },
              h("label", { style: { fontFamily:"'Space Mono',monospace", fontSize:9, color:"#64748b", display:"block", marginBottom:5, textTransform:"uppercase", letterSpacing:1 } }, "Categoria"),
              h("input", { value:category, onChange: function(e) { setCategory(e.target.value); }, onKeyDown: function(e) { if (e.key==="Enter") doSearch(); }, placeholder:"ex: pizzaria, hamburgueria...", style: { width:"100%", background:"#0c0f14", border:"1px solid #2a3142", borderRadius:6, padding:"8px 10px", color:"#e2e8f0", fontSize:13 } })
            ),
            h("div", { style: { flex:"0 1 120px" } },
              h("label", { style: { fontFamily:"'Space Mono',monospace", fontSize:9, color:"#64748b", display:"block", marginBottom:5, textTransform:"uppercase", letterSpacing:1 } }, "Min. avaliacoes"),
              h("input", { type:"number", value:minReviews, onChange: function(e) { setMinReviews(+e.target.value); }, style: { width:"100%", background:"#0c0f14", border:"1px solid #2a3142", borderRadius:6, padding:"8px 10px", color:"#e2e8f0", fontFamily:"'Space Mono',monospace", fontSize:13 } })
            ),
            h("button", { onClick:doSearch, disabled:loading, style: { background: loading ? "#1e2535" : "linear-gradient(135deg,#38bdf8,#0ea5e9)", color: loading ? "#3d4559" : "#0c0f14", border:"none", borderRadius:7, padding:"9px 20px", fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:12, cursor: loading ? "default" : "pointer", letterSpacing:1, whiteSpace:"nowrap" } },
              loading ? ("BUSCANDO... "+(loadingPage>0?"(pag "+loadingPage+"/5)":"")) : "BUSCAR \u2192"
            )
          )
        ),

        error && h("div", { style: { background:"rgba(248,113,113,0.08)", border:"1px solid rgba(248,113,113,0.25)", borderRadius:7, padding:"10px 14px", color:"#f87171", fontSize:12 } }, error),

        results.length > 0 && h("div", { style: { display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" } },
          h("span", { style: { fontFamily:"'Space Mono',monospace", fontSize:10, color:"#64748b" } }, results.length+" resultados"),
          h("div", { style: {flex:1} }),
          h("button", { onClick:scoreAll, disabled:!!scoringId, style: { background:"rgba(74,222,128,0.1)", border:"1px solid rgba(74,222,128,0.25)", color:"#4ade80", padding:"5px 14px", borderRadius:5, fontSize:10, fontFamily:"'Space Mono',monospace", cursor:"pointer" } }, "\u26a1 Score IA em todos"),
          h("button", { onClick: function() { results.forEach(function(p) { addToPipeline(p); }); }, style: { background:"rgba(56,189,248,0.1)", border:"1px solid rgba(56,189,248,0.25)", color:"#38bdf8", padding:"5px 14px", borderRadius:5, fontSize:10, fontFamily:"'Space Mono',monospace", cursor:"pointer" } }, "+ Todos no pipeline")
        ),

        h("div", { style: { display:"flex", flexDirection:"column", gap:10 } },
          results.map(function(place, i) {
            return h(PlaceCard, { key:place.id, place:place, index:i, onScore:scorePlace, onAdd:addToPipeline, scoring:scoringId===place.id, inPipeline:!!pipeline.find(function(p) { return p.id===place.id; }) });
          })
        )
      ),

      // PIPELINE TAB
      tab === "pipeline" && h("div", { style: { display:"flex", flexDirection:"column", gap:16 } },
        h("div", { style: { display:"flex", justifyContent:"flex-end" } },
          h("button", { onClick: function() { setShowStatusMgr(true); }, style: { background:"rgba(167,139,250,0.1)", border:"1px solid rgba(167,139,250,0.3)", color:"#a78bfa", padding:"5px 14px", borderRadius:5, fontSize:10, fontFamily:"'Space Mono',monospace", cursor:"pointer" } }, "\u2699 gerenciar status")
        ),
        h("div", { style: { display:"flex", gap:10, flexWrap:"wrap" } },
          statuses.map(function(s) {
            return h("div", { key:s.id, style: { background:s.bg, border:"1px solid "+s.color+"30", borderRadius:8, padding:"10px 16px", flex:"1 1 100px" } },
              h("div", { style: { fontFamily:"'Space Mono',monospace", fontSize:20, fontWeight:700, color:s.color } }, pipelineByStatus[s.id]||0),
              h("div", { style: { fontSize:11, color:"#94a3b8", marginTop:2 } }, s.label)
            );
          })
        ),
        pipeline.length > 0
          ? h(React.Fragment, null,
              h("div", { style: { display:"flex", justifyContent:"flex-end" } },
                h("button", { onClick:exportExcel, style: { background:"linear-gradient(135deg,#4ade80,#22c55e)", color:"#0c0f14", border:"none", borderRadius:7, padding:"8px 18px", fontFamily:"'Space Mono',monospace", fontWeight:700, fontSize:11, cursor:"pointer", letterSpacing:1 } }, "\u2193 EXPORTAR EXCEL")
              ),
              h("div", { style: { display:"flex", flexDirection:"column", gap:8 } },
                orderedPipeline.map(function(p) {
                  return h(PipelineRow, { key:p.id, prospect:p, onStatusChange:updateStatus, onRemove:removeFromPipeline, onObsChange:updateObs, statuses:statuses });
                })
              )
            )
          : h("div", { style: { textAlign:"center", padding:"60px 20px", color:"#3d4559", fontFamily:"'Space Mono',monospace", fontSize:12 } },
              "Pipeline vazio.", h("br"), h("span", { style: {color:"#64748b"} }, "Adicione prospects na aba Busca.")
            )
      )
    ),

    showStatusMgr && h(StatusManager, { statuses:statuses, onSave:handleSaveStatuses, onClose: function() { setShowStatusMgr(false); } })
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
